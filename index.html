<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Distant Lights</title>
    <meta name="description" content="Physics-informed light-to-sound playground with sequencing, layering and automation." />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page app-shell">
      <main class="app-grid">
        <section class="panel dark top-panel">
          <div class="topbar compact-grid">
            <label class="field preset-field">
              <span>Preset</span>
              <select id="presetSelect"></select>
            </label>
            <div class="status compact-status" id="statusText">Ready</div>
          </div>

          <div class="button-row compact-buttons wrap">
            <button id="playBtn" class="primary">Play</button>
            <button id="playProjectBtn">Play project</button>
            <button id="stopBtn">Stop</button>
            <button id="exportWavBtn">WAV</button>
            <button id="exportProjectWavBtn">Seq WAV</button>
            <button id="recordBtn">Record</button>
            <button id="exportMidiBtn">MIDI</button>
            <button id="exportOscBtn">OSC</button>
            <button id="exportJsonBtn">Project JSON</button>
            <button id="saveBrowserBtn">Save</button>
            <label class="button like-button compact-file-btn">
              Import
              <input id="importPresetInput" type="file" accept="application/json,.json" hidden />
            </label>
          </div>

          <div class="preview-grid compact-preview-grid">
            <section class="preview-card">
              <div class="mini-title">Light</div>
              <canvas id="lightCanvas" width="640" height="150"></canvas>
            </section>
            <section class="preview-card">
              <div class="mini-title">Audio</div>
              <canvas id="audioCanvas" width="640" height="150"></canvas>
            </section>
          </div>

          <section class="compact-summary">
            <div class="summary-row">
              <div class="summary-item">
                <span class="summary-k">Model</span>
                <span class="summary-v" id="modelTitle"></span>
              </div>
              <div class="summary-item">
                <span class="summary-k">Interpretation</span>
                <span class="summary-v" id="literalStatus"></span>
              </div>
              <div class="summary-item wide">
                <span class="summary-k">Params</span>
                <span class="summary-v mono" id="numericSummary"></span>
              </div>
            </div>
            <div class="formula-row mono">
              <div id="formula1"></div>
              <div id="formula2"></div>
            </div>
            <div class="warning compact-warning" id="warningBox"></div>
          </section>
        </section>

        <aside class="panel light side-panel">
          <div class="section-head">
            <h2>Controls</h2>
            <div class="small-note" id="capabilityText">Ready</div>
          </div>
          <div id="controlsContainer" class="controls-grid compact-controls"></div>

          <section class="panel-subsection">
            <div class="saved-head">Layering</div>
            <div class="layers-grid">
              <label class="layer-card">
                <input id="layerElectricalEnabled" type="checkbox" checked />
                <span>Electrical hum</span>
                <input id="layerElectricalGain" type="range" min="0" max="2" step="0.01" value="1" />
              </label>
              <label class="layer-card">
                <input id="layerPhotoEnabled" type="checkbox" />
                <span>Photoacoustic</span>
                <input id="layerPhotoGain" type="range" min="0" max="2" step="0.01" value="0.8" />
              </label>
              <label class="layer-card">
                <input id="layerSonifyEnabled" type="checkbox" />
                <span>Sonification</span>
                <input id="layerSonifyGain" type="range" min="0" max="2" step="0.01" value="0.8" />
              </label>
            </div>
          </section>

          <section class="saved-inline">
            <div class="saved-head">Saved browser projects</div>
            <div class="saved-row">
              <select id="savedPresetSelect" class="grow"></select>
              <button id="loadBrowserBtn">Load</button>
              <button id="deleteBrowserBtn">Delete</button>
            </div>
          </section>
        </aside>
      </main>

      <section class="panel dark project-panel">
        <div class="section-head">
          <h2>Automation / LFO</h2>
          <div class="button-row compact-buttons">
            <button id="addAutomationLaneBtn">Add lane</button>
          </div>
        </div>
        <div id="automationContainer" class="automation-stack"></div>
      </section>

      <section class="panel dark project-panel">
        <div class="section-head">
          <h2>Sequence / timeline editor</h2>
          <div class="button-row compact-buttons">
            <button id="addCurrentEventBtn">Add current as event</button>
            <button id="clearSequenceBtn">Clear sequence</button>
          </div>
        </div>
        <label class="field bpm-field">
          <span>MIDI tempo (BPM)</span>
          <input id="sequenceBpmInput" type="number" min="20" max="300" step="1" value="120" />
        </label>
        <canvas id="timelineCanvas" class="timeline-canvas" width="1200" height="96"></canvas>
        <div id="sequenceContainer" class="sequence-stack"></div>
      </section>
    </div>

    <script type="module" src="main.js"></script>
  </body>
</html>
